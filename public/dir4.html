<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>氛寸 · 今日推荐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f7f4ec;      /* 宣纸白 */
    --paper-deep:#efeae0;
    --ink:#1a1a1a;        /* 浓墨黑 */
    --ink-soft:#3a3733;
    --ink-faint:#8a857b;
    --seal:#9c3a2e;       /* 印章红 */
    --hair:#ded7c8;
    --hair-ink:#2a2724;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:#cdc4b0;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    font-family:"Noto Serif SC",serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    padding:32px 0;
  }

  /* ── 手机机身 ── */
  .phone{
    width:372px;
    background:#0e0e0e;
    border-radius:52px;
    padding:12px;
    box-shadow:
      0 2px 3px rgba(0,0,0,.28),
      0 30px 60px -18px rgba(30,22,12,.55),
      0 60px 120px -40px rgba(30,22,12,.5),
      inset 0 0 0 2px #262626,
      inset 0 0 0 6px #050505;
    position:relative;
  }
  .phone::after{ /* 侧键 */
    content:"";position:absolute;right:-2px;top:150px;width:3px;height:66px;
    border-radius:0 3px 3px 0;background:#1c1c1c;
  }
  .phone::before{ /* 静音键 */
    content:"";position:absolute;left:-2px;top:120px;width:3px;height:34px;
    border-radius:3px 0 0 3px;background:#1c1c1c;box-shadow:0 52px 0 #1c1c1c,0 108px 0 #1c1c1c;
  }

  /* ── 屏幕 ── */
  .screen{
    position:relative;
    height:772px;
    border-radius:42px;
    overflow:hidden;
    background:var(--paper);
    background-image:
      radial-gradient(120% 80% at 78% -6%, #ffffff 0%, rgba(255,255,255,0) 46%),
      radial-gradient(90% 60% at 20% 108%, var(--paper-deep) 0%, rgba(239,234,224,0) 55%);
  }
  /* 极细宣纸纹理 */
  .screen::before{
    content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
    background:
      repeating-linear-gradient(0deg, rgba(26,26,26,.014) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
  }

  /* 状态栏 */
  .status{
    position:relative;z-index:5;
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 30px 4px;
    font-family:"Archivo",sans-serif;
    font-size:13px;font-weight:600;letter-spacing:.4px;color:var(--ink);
  }
  .status .dots{display:flex;gap:5px;align-items:center;}
  .status .bat{width:22px;height:11px;border:1.4px solid var(--ink);border-radius:3px;position:relative;padding:1.5px;}
  .status .bat::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:var(--ink);border-radius:0 1px 1px 0;}
  .status .bat i{display:block;height:100%;width:72%;background:var(--ink);border-radius:1px;}
  .status .sig{display:flex;gap:2px;align-items:flex-end;height:11px;}
  .status .sig b{width:3px;background:var(--ink);border-radius:1px;}
  .status .sig b:nth-child(1){height:4px}.status .sig b:nth-child(2){height:6px}
  .status .sig b:nth-child(3){height:8px}.status .sig b:nth-child(4){height:11px}

  /* 主体滚动区（静态展示，无需滚） */
  .canvas{position:relative;z-index:4;height:calc(772px - 42px);padding:2px 30px 0;display:flex;flex-direction:column;}

  /* ── 顶栏：品牌 + 印章 ── */
  .top{display:flex;align-items:flex-start;justify-content:space-between;margin-top:6px;}
  .brand .cn{
    font-weight:600;font-size:20px;letter-spacing:.42em;color:var(--ink);
    padding-left:.42em;
  }
  .brand .en{
    font-family:"Archivo",sans-serif;font-size:10px;font-weight:500;
    letter-spacing:.44em;text-transform:uppercase;color:var(--ink-faint);
    margin-top:5px;padding-left:.1em;
  }
  .seal{
    width:38px;height:38px;flex:none;position:relative;
    border:1.6px solid var(--seal);border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    color:var(--seal);font-weight:700;font-size:15px;letter-spacing:0;
    box-shadow:inset 0 0 0 3px var(--paper), inset 0 0 0 4px rgba(156,58,46,.28);
    transform:rotate(-3deg);
    line-height:1;
  }
  .seal span{display:flex;flex-direction:column;align-items:center;gap:1px;letter-spacing:-1px;}

  /* ── 情境行 ── */
  .context{
    margin-top:22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    font-family:"Archivo",sans-serif;
  }
  .context .loc{
    font-family:"Noto Serif SC",serif;font-weight:500;font-size:12.5px;
    letter-spacing:.18em;color:var(--ink);
  }
  .context .div{width:14px;height:1px;background:var(--ink);opacity:.28;}
  .context .meta{
    font-size:10.5px;letter-spacing:.14em;color:var(--ink-soft);font-weight:500;
  }
  .context .temp{
    margin-left:auto;font-family:"Cormorant",serif;font-weight:500;
    font-size:30px;line-height:1;color:var(--ink);letter-spacing:-1px;
  }
  .context .temp sup{font-size:14px;top:-.7em;}

  .rule{height:1px;background:var(--ink);opacity:.9;margin-top:14px;}
  .rule.faint{opacity:.16;}

  /* ── 编号 + 巨大香名 ── */
  .hero{margin-top:26px;position:relative;}
  .hero .index{
    display:flex;align-items:center;gap:9px;margin-bottom:14px;
  }
  .hero .index .no{
    font-family:"Archivo",sans-serif;font-size:10px;font-weight:600;
    letter-spacing:.32em;color:var(--ink-faint);text-transform:uppercase;
  }
  .hero .index .redchip{
    width:7px;height:7px;background:var(--seal);border-radius:1px;
    box-shadow:0 0 0 2px rgba(156,58,46,.16);
  }

  .hero .cnname{
    font-weight:400;
    font-size:72px;line-height:.98;letter-spacing:.06em;
    color:var(--ink);
    padding-left:.06em;
  }
  .hero .cnname .accent{color:var(--seal);}
  .hero .enname{
    font-family:"Cormorant",serif;font-style:italic;font-weight:500;
    font-size:34px;letter-spacing:.02em;color:var(--ink-soft);
    margin-top:8px;
  }
  .hero .subline{
    margin-top:14px;display:flex;align-items:center;gap:10px;
    font-family:"Archivo",sans-serif;font-size:10.5px;font-weight:500;
    letter-spacing:.16em;color:var(--ink-soft);text-transform:uppercase;
  }
  .hero .subline .dot{width:3px;height:3px;border-radius:50%;background:var(--ink-faint);}
  .hero .subline .house{font-family:"Noto Serif SC",serif;text-transform:none;letter-spacing:.1em;font-weight:500;}

  /* ── 香调 竖排刻度 ── */
  .notes{margin-top:30px;display:flex;flex-direction:column;gap:0;}
  .notes .row{
    display:grid;grid-template-columns:64px 1fr 42px;align-items:center;gap:14px;
    padding:11px 0;border-top:1px solid var(--hair);
  }
  .notes .row:last-child{border-bottom:1px solid var(--hair);}
  .notes .nm{
    font-weight:500;font-size:15px;letter-spacing:.28em;color:var(--ink);
    padding-left:.14em;
  }
  .notes .track{position:relative;height:2px;background:var(--hair);}
  .notes .track i{
    position:absolute;left:0;top:0;height:100%;background:var(--ink);
    transform-origin:left;animation:grow 1.2s cubic-bezier(.2,.7,.2,1) both;
  }
  .notes .row:nth-child(1) i{width:100%;animation-delay:.15s;}
  .notes .row:nth-child(2) i{width:72%;animation-delay:.28s;}
  .notes .row:nth-child(3) i{width:46%;animation-delay:.41s;}
  .notes .row:nth-child(4) i{width:30%;animation-delay:.54s;}
  .notes .row.peak i{background:var(--seal);height:3px;top:-.5px;}
  .notes .pct{
    font-family:"Cormorant",serif;font-weight:600;font-size:20px;
    text-align:right;color:var(--ink);letter-spacing:0;
  }
  @keyframes grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}

  /* ── AI 解读 ── */
  .read{margin-top:30px;position:relative;padding-left:16px;}
  .read::before{content:"";position:absolute;left:0;top:3px;bottom:3px;width:2px;background:var(--seal);}
  .read p{
    font-weight:300;font-size:15.5px;line-height:2.05;letter-spacing:.03em;
    color:var(--ink-soft);text-align:justify;
  }
  .read p .em{color:var(--ink);font-weight:500;}
  .read .sign{
    margin-top:14px;font-family:"Archivo",sans-serif;font-size:9.5px;
    font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-faint);
  }

  /* ── 用香三件套 ── */
  .kit{margin-top:28px;display:grid;grid-template-columns:1fr 1fr 1fr;}
  .kit .cell{
    padding:2px 12px;border-left:1px solid var(--hair);
  }
  .kit .cell:first-child{padding-left:0;border-left:none;}
  .kit .k{
    font-family:"Archivo",sans-serif;font-size:8.5px;font-weight:600;
    letter-spacing:.24em;text-transform:uppercase;color:var(--ink-faint);
  }
  .kit .v{
    font-weight:600;font-size:15px;letter-spacing:.06em;color:var(--ink);margin-top:8px;line-height:1.25;
  }
  .kit .n{
    font-weight:300;font-size:10.5px;letter-spacing:.05em;color:var(--ink-faint);margin-top:5px;line-height:1.4;
  }

  /* ── 也可以考虑 ── */
  .alt{margin-top:24px;}
  .alt .h{
    font-family:"Archivo",sans-serif;font-size:9px;font-weight:600;
    letter-spacing:.28em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px;
  }
  .alt .item{
    display:flex;align-items:baseline;gap:10px;padding:8px 0;border-top:1px solid var(--hair);
  }
  .alt .item .cn{font-weight:500;font-size:14px;letter-spacing:.14em;color:var(--ink);}
  .alt .item .en{font-family:"Cormorant",serif;font-style:italic;font-size:15px;color:var(--ink-faint);}
  .alt .item .tag{margin-left:auto;font-weight:300;font-size:10.5px;letter-spacing:.08em;color:var(--ink-soft);}

  /* ── 主操作 ── */
  .actions{margin-top:auto;padding:22px 0 26px;display:flex;gap:12px;}
  .btn{
    flex:1;height:52px;border-radius:2px;display:flex;align-items:center;justify-content:center;
    font-weight:500;font-size:15px;letter-spacing:.34em;padding-left:.34em;cursor:pointer;
    transition:transform .18s ease;
  }
  .btn.ghost{
    background:transparent;color:var(--ink);border:1px solid var(--ink);
  }
  .btn.solid{
    background:var(--ink);color:var(--paper);position:relative;overflow:hidden;
    flex:1.5;
  }
  .btn.solid .seal-mini{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    width:16px;height:16px;border:1.4px solid var(--seal);border-radius:3px;
    color:var(--seal);font-size:0;
  }
  .btn.solid .seal-mini::after{content:"钤";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--seal);letter-spacing:0;}
  .btn:active{transform:scale(.98);}

  /* Home 指示条 */
  .home{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);width:118px;height:5px;border-radius:3px;background:var(--ink);opacity:.85;z-index:6;}

  /* 入场 */
  .canvas > *{animation:rise .7s cubic-bezier(.2,.7,.2,1) both;}
  .top{animation-delay:.02s}.context{animation-delay:.06s}.rule{animation-delay:.1s}
  .hero{animation-delay:.14s}.notes{animation-delay:.2s}.read{animation-delay:.26s}
  .kit{animation-delay:.32s}.alt{animation-delay:.36s}.actions{animation-delay:.42s}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
  <div class="phone">
    <div class="screen">

      <div class="status">
        <span>9:41</span>
        <span class="dots">
          <span class="sig"><b></b><b></b><b></b><b></b></span>
          <span style="font-family:Archivo,sans-serif;font-size:11px;font-weight:600;">5G</span>
          <span class="bat"><i></i></span>
        </span>
      </div>

      <div class="canvas">

        <!-- 品牌 + 印章 -->
        <div class="top">
          <div class="brand">
            <div class="cn">氛寸</div>
            <div class="en">Fēn Cùn</div>
          </div>
          <div class="seal"><span>今<em style="font-style:normal">日</em></span></div>
        </div>

        <!-- 情境 -->
        <div class="context">
          <span class="loc">上海</span>
          <span class="div"></span>
          <span class="meta">多云转晴 · 微风 · 湿度 62% · 白天 · 夏</span>
          <span class="temp">25<sup>°</sup></span>
        </div>
        <div class="rule"></div>

        <!-- 巨大香名 -->
        <div class="hero">
          <div class="index">
            <span class="redchip"></span>
            <span class="no">No. 01 &nbsp;/&nbsp; 今日推荐 &nbsp;/&nbsp; 偏男香 · 2010</span>
          </div>
          <div class="cnname">信仰<span class="accent">之</span>水</div>
          <div class="enname">Aventus</div>
          <div class="subline">
            <span class="house">信仰 Creed</span>
          </div>
        </div>

        <!-- 香调 -->
        <div class="notes">
          <div class="row peak"><span class="nm">木质</span><span class="track"><i></i></span><span class="pct">100</span></div>
          <div class="row"><span class="nm">果香</span><span class="track"><i></i></span><span class="pct">72</span></div>
          <div class="row"><span class="nm">烟草</span><span class="track"><i></i></span><span class="pct">46</span></div>
          <div class="row"><span class="nm">麝香</span><span class="track"><i></i></span><span class="pct">30</span></div>
        </div>

        <!-- AI 解读 -->
        <div class="read">
          <p>果香利落、木质皮革打底，在今天微润的晴天里<span class="em">通透而不腻</span>——社区投票里它其实更偏夏季。通勤路上，它是恰到好处的那种自信。</p>
          <div class="sign">氛寸 · 此刻为你解读</div>
        </div>

        <!-- 用香三件套 -->
        <div class="kit">
          <div class="cell">
            <div class="k">喷量</div>
            <div class="v">2–3 下</div>
            <div class="n">先少后补</div>
          </div>
          <div class="cell">
            <div class="k">社交距离</div>
            <div class="v">一臂之内</div>
            <div class="n">正常社交</div>
          </div>
          <div class="cell">
            <div class="k">留香</div>
            <div class="v">一整个白天</div>
            <div class="n">无需补喷</div>
          </div>
        </div>

        <!-- 也可以考虑 -->
        <div class="alt">
          <div class="h">也可以考虑</div>
          <div class="item">
            <span class="cn">蓝风铃</span><span class="en">Wild Bluebell</span>
            <span class="tag">清新通勤</span>
          </div>
          <div class="item">
            <span class="cn">旷野</span><span class="en">Sauvage</span>
            <span class="tag">日常百搭</span>
          </div>
        </div>

        <!-- 主操作 -->
        <div class="actions">
          <div class="btn ghost">换一瓶</div>
          <div class="btn solid">就用它<span class="seal-mini"></span></div>
        </div>

      </div>

      <div class="home"></div>
    </div>
  </div>
</body>
</html>
