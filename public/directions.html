<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>氛寸 · 四个视觉方向并排</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Noto Serif SC",serif;background:#e8e2d4;color:#2a241b;padding:34px 24px 60px}
  .head{max-width:1000px;margin:0 auto 26px;text-align:center}
  .head h1{font-weight:600;font-size:23px;letter-spacing:.04em}
  .head p{margin-top:9px;font-size:13.5px;line-height:1.8;color:#5c5442;max-width:680px;margin-left:auto;margin-right:auto}
  .head .tip{margin-top:10px;font-family:"Fraunces",serif;font-style:italic;font-size:12.5px;color:#8a7f66}
  .row{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;align-items:flex-start}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px}
  .cap{display:flex;align-items:baseline;gap:8px}
  .cap .idx{font-family:"Fraunces",serif;font-style:italic;font-size:14px;color:#a5823f}
  .cap .nm{font-weight:600;font-size:16px;letter-spacing:.06em;color:#2a241b}
  .cap .en{font-family:"Fraunces",serif;font-style:italic;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a7f66}
  .frame{width:404px;height:864px;border-radius:20px;overflow:hidden;box-shadow:0 20px 50px -26px rgba(40,32,20,.45)}
  iframe{width:404px;height:864px;border:0;display:block}
  @media (max-width:900px){ .frame,iframe{width:360px;height:800px} }
</style>
</head>
<body>
  <div class="head">
    <h1>四个视觉方向 · 并排审核</h1>
    <p>同一张「今日推荐」（信仰之水），四种截然不同的气质。都针对你的三点不满做了处理：更有个性、对比拉满、字体讲究（中文全部用宋体，不再系统黑体）。</p>
    <div class="tip">告诉我你要哪一号（或哪几处元素想混搭），我把真实 App 按它重构。</div>
  </div>
  <div class="row">
    <div class="col">
      <div class="cap"><span class="idx">01</span><span class="nm">深色画廊</span><span class="en">Noir Gallery</span></div>
      <div class="frame"><iframe src="/dir1.html" loading="lazy" title="深色画廊"></iframe></div>
    </div>
    <div class="col">
      <div class="cap"><span class="idx">02</span><span class="nm">现代高对比</span><span class="en">Bold Modern</span></div>
      <div class="frame"><iframe src="/dir2.html" loading="lazy" title="现代高对比"></iframe></div>
    </div>
    <div class="col">
      <div class="cap"><span class="idx">03</span><span class="nm">编辑感香誌</span><span class="en">Warm Editorial</span></div>
      <div class="frame"><iframe src="/dir3.html" loading="lazy" title="编辑感香誌"></iframe></div>
    </div>
    <div class="col">
      <div class="cap"><span class="idx">04</span><span class="nm">雅奢东方</span><span class="en">Refined Oriental</span></div>
      <div class="frame"><iframe src="/dir4.html" loading="lazy" title="雅奢东方"></iframe></div>
    </div></div>
</body>
</html>
